<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rey Fritz Eisen L. Tan | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0d1b2e;
  --navy-mid:#152540;
  --accent:#c8a96e;
  --silver:#8fa3bc;
  --white:#f4f8fc;
}

body {
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  color:var(--white);
}

nav {
  position:fixed;
  top:0;
  width:100%;
  padding:1rem 6%;
  background:rgba(13,27,46,0.92);
  display:flex;
  justify-content:space-between;
}

.nav-logo { color:var(--accent); font-weight:700; }

section { padding:6rem 6%; }

.projects-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:1.5rem;
}

.project-card {
  background:var(--navy-mid);
  border:1px solid rgba(200,169,110,0.1);
  border-radius:8px;
  overflow:hidden;
}

.project-preview { height:140px; background:#0b0f1a; }

.project-header {
  padding:1rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* PROJECT NAME = ONLY LINK */
.project-title a {
  color:var(--accent);
  text-decoration:none;
  font-size:1.1rem;
  font-weight:600;
}

/* hover tooltip via title attribute handled in HTML */

.project-body {
  padding:1rem;
  color:var(--silver);
  font-size:0.9rem;
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">RFELT</div>
</nav>

<section>

<h2>Projects</h2>

<div class="projects-grid">

  <!-- STOCK M -->
  <div class="project-card">

    <div class="project-preview"></div>

    <div class="project-header">
      <div class="project-title">
        <a href="https://tanreyfritz.github.io/stockmarketmonitor/"
           target="_blank"
           title="Open Stock M Live App">
          Stock M
        </a>
      </div>
    </div>

    <div class="project-body">
      Multi-market stock dashboard with real-time simulation engine.
    </div>

  </div>

  <!-- FOREX M -->
  <div class="project-card">

    <div class="project-preview"></div>

    <div class="project-header">
      <div class="project-title">
        <a href="https://tanreyfritz.github.io/forexmonitor/"
           target="_blank"
           title="Open Forex M Live App">
          Forex M
        </a>
      </div>
    </div>

    <div class="project-body">
      Live forex tracker with ECB-based rates and currency analytics.
    </div>

  </div>

</div>

</section>

<section>
  <h2>Contact</h2>
  <p>
    LinkedIn:
    <a href="https://www.linkedin.com/in/rey-fritz-tan-b14a51302" target="_blank">
      Profile
    </a>
  </p>
</section>

</body>
</html>
